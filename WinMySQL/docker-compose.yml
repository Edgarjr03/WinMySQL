version: '3.8'

services:
  mysql:
    image: mysql:8.0
    command: >
             --default-authentication-plugin=mysql_native_password
             --bind-address=0.0.0.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: NissanGTR03.
      MYSQL_DATABASE: escolar
      MYSQL_USER: edgarjr
      MYSQL_PASSWORD: NissanGTR03.
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - mysql_network

volumes:
  mysql_data:
    driver: local

networks:
  mysql_network:
    driver: bridge


      
    